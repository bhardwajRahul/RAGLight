services:
  raglight-api:
    image: python:3.12-slim
    command: >
      bash -c "pip install raglight && raglight serve"
    ports:
      - "8000:8000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"  # access Ollama running on the host
    volumes:
      - ./raglight_db:/app/raglight_db
    working_dir: /app
